[colors]
; nord base
bg        = #2e3440
bg-alt    = #3b4252
fg        = #d8dee9
muted     = #4c566a

blue      = #88c0d0
blue-dim  = #81a1c1
cyan      = #8fbcbb

green     = #a3be8c
yellow    = #ebcb8b
orange    = #d08770
red       = #bf616a
purple    = #b48ead

[bar/toph]
width = 100%
height = 20pt
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 0

padding-left = 1
padding-right = 2
module-margin = 2

font-0 = "JetBrainsMono Nerd Font:size=9;2"

modules-left = xworkspaces xwindow
modules-right = pulseaudio brightness cpu memory battery date systray

enable-ipc = true
cursor-click = pointer
cursor-scroll = ns-resize

; --------------------------------

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.blue-dim}
label-active-foreground = ${colors.bg}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2

; --------------------------------

[module/xwindow]
type = internal/xwindow
label = %{F#81a1c1}%title:0:50:...%%{F-}

; --------------------------------

[module/pulseaudio]
type = internal/pulseaudio

format-volume = "  <label-volume>"
format-muted  = "  muted"

label-volume = %percentage%%
label-muted-foreground = ${colors.muted}

; --------------------------------

[module/cpu]
type = internal/cpu
interval = 2
format = "  <label>"
label = %percentage:2%%
format-foreground = ${colors.cyan}

; --------------------------------

[module/memory]
type = internal/memory
interval = 3
format = "  <label>"
label = %percentage_used%%
format-foreground = ${colors.purple}

; --------------------------------

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
poll-interval = 10

format-charging    = "  <label>"
format-discharging = "<ramp-capacity> <label>"
format-full        = "  full"

label = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

format-charging-foreground = ${colors.yellow}
format-discharging-foreground = ${colors.green}

; --------------------------------

[module/brightness]
type = custom/script
exec = ~/.config/polybar/brightness.sh get
interval = 2

format = "  <label>"
label = %output%

scroll-up = ~/.config/polybar/brightness.sh up
scroll-down = ~/.config/polybar/brightness.sh down

format-foreground = ${colors.yellow}

; --------------------------------

[module/date]
type = internal/date
interval = 1

date = %b %d  %H:%M
label = "  %date%"
label-foreground = ${colors.blue}

; --------------------------------

[module/systray]
type = internal/tray
tray-spacing = 10

[settings]
screenchange-reload = true
pseudo-transparency = true
